name: EXP warp exit

# EXPERIMENT — dispatch-only, no cron, no successor dispatch, no Webshare.
#
# One question: **what determines a WARP exit IP?**
#
# It matters because token solve-rate is capped per exit IP, not per machine.
# Measured 2026-07-24: a single WARP producer sustains 49.3 tok/min for 20 min
# with one Cloudflare error, but two concurrent runs drew the SAME exit
# (104.28.196.79) and the second minted nothing but Cloudflare 300030. So WARP
# scales horizontally only if N runners can be made to land on N distinct exits.
#
# This probe is deliberately cheap: no browser, no minting, ~2 minutes per job.
# It reports only the exit IP and the terminating Cloudflare colo, which is the
# variable that should explain everything.
#
# Also relevant cross-lane: another lane is testing WARP as an extra egress on
# the Oracle VM. If both land on the same anycast exit they cannibalise each
# other. Whatever predicts the exit is what lets the two lanes be partitioned.

on:
  workflow_dispatch:
    inputs:
      fanout:
        description: How many concurrent probes to run
        required: true
        default: "4"
        type: choice
        options: ["1", "2", "4", "6", "8"]
      strategy:
        description: How to vary the WireGuard endpoint per job
        required: true
        default: default
        type: choice
        options: [default, endpoint-ip, endpoint-port, endpoint-both]
      stagger_seconds:
        description: Seconds to delay job N by (N * this). 0 = all at once.
        required: true
        default: "0"

permissions:
  contents: read

concurrency:
  group: exp-warp-exit-${{ inputs.strategy }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          n='${{ inputs.fanout }}'
          m=$(python3 -c "print(__import__('json').dumps(list(range(1, $n+1))))")
          echo "matrix=$m" >> "$GITHUB_OUTPUT"
          echo "matrix=$m"

  probe:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        idx: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Stagger
        shell: bash
        run: |
          delay=$(( ${{ matrix.idx }} * ${{ inputs.stagger_seconds }} ))
          echo "job ${{ matrix.idx }} delaying ${delay}s"
          sleep "$delay"

      - name: Baseline (runner's own egress)
        shell: bash
        run: |
          set +e
          echo "idx=${{ matrix.idx }}"
          echo "runner_ip=$(curl -4 -s --max-time 15 https://api.ipify.org)"
          curl -s --max-time 15 https://www.cloudflare.com/cdn-cgi/trace \
            | grep -E '^(colo|loc)=' | sed 's/^/runner_/'
          exit 0

      - name: Bring up WARP and report the exit
        shell: bash
        run: |
          set -euo pipefail
          # Curated known WARP anycast endpoints, spread across distinct
          # prefixes, and known-open WARP ports. If the exit is a function of
          # either, varying them per job is the lever that makes WARP scale.
          HOSTS=(162.159.192.1 162.159.193.10 162.159.195.1 188.114.96.1 \
                 188.114.97.1 188.114.98.1 188.114.99.1 162.159.204.1)
          PORTS=(2408 500 1701 4500 8854 894 943 3138)
          i=$(( ${{ matrix.idx }} - 1 ))
          host=""; port=""
          case '${{ inputs.strategy }}' in
            endpoint-ip)   host="${HOSTS[$(( i % ${#HOSTS[@]} ))]}" ;;
            endpoint-port) host="engage.cloudflareclient.com"; port="${PORTS[$(( i % ${#PORTS[@]} ))]}" ;;
            endpoint-both) host="${HOSTS[$(( i % ${#HOSTS[@]} ))]}"; port="${PORTS[$(( i % ${#PORTS[@]} ))]}" ;;
            default)       : ;;
          esac
          chmod +x experiments/egress/warp_up.sh
          experiments/egress/warp_up.sh 25344 "$host" "$port" | sed 's/^/RESULT_/'
