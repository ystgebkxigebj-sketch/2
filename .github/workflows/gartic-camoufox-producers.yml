name: Gartic Camoufox producers
run-name: ${{ inputs.producers }}x ${{ inputs.tunnel }} for ${{ inputs.duration }}s (relay=${{ inputs.post_to_relay }})

# Token producer that costs ZERO metered proxy bandwidth.
#
# The fleet used to need a Webshare HTTP CONNECT proxy because Cloudflare
# refuses to serve the Turnstile challenge to GitHub's own egress. That refusal
# is an ASN property, not a GitHub property: every GitHub-hosted fleet — Linux,
# Windows, macOS, x64 and arm64 — egresses from AS8075 (Microsoft), and all of
# them get a solid wall of Cloudflare error 600010.
#
# Measured on 2026-07-24, same workflow, same commit, same minute:
#
#   ubuntu-24.04 direct (AS8075 Microsoft)   -> 0 tokens, 93x 600010
#   ubuntu-24.04 via WARP (AS13335 Cloudflare) -> 238 tokens in 301s
#                                              = 47.4 tok/min, 0 cf errors,
#                                                3/3 verified JOINED
#
# WARP is free, needs no account and no credentials: wgcf registers anonymously
# and wireproxy runs WireGuard in userspace, so there is no kernel module and no
# root involved. At ~0.75 MB/token this run would have cost ~180 MB of Webshare;
# it costs nothing.
#
# Measured horizontal scale (2026-07-24), 4 concurrent producers each:
#
#   WARP     x4 -> 825 tokens / 301 s = 164.5 tok/min aggregate, 12/12 JOINED
#   VPN Gate x4 -> 380 tokens / 301 s =  75.7 tok/min aggregate, 12/12 JOINED
#
# Plan on ~40 tok/min per WARP producer and ~19 per VPN Gate producer. Sharing a
# WARP exit IP between producers was measured to cost nothing, so the fleet does
# not need distinct exits to scale.
#
# Not scheduled on purpose — nothing here self-dispatches, because a dying run's
# successor dispatch is what caused the previous runaway-respawn incident. The
# operator dispatches deliberately. Read
# `oracle server/research/github-no-webshare.md` before adding a cron.

on:
  workflow_dispatch:
    inputs:
      tunnel:
        description: Egress (warp is faster; vpngate is residential + more diverse)
        required: true
        default: warp
        type: choice
        options: [warp, vpngate]
      producers:
        description: Concurrent producers (~40 tok/min each on warp, ~19 on vpngate)
        required: true
        default: "2"
        type: choice
        options: ["1", "2", "3", "4", "5", "6"]
      duration:
        description: Seconds to mint for (job timeout is 350 min, GitHub caps jobs at 6 h)
        required: true
        default: "1800"
      token_interval:
        description: Seconds to wait after each token (0 = unthrottled ~47/min)
        required: true
        default: "0"
      post_to_relay:
        description: Feed the live relay (false = measure only)
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

# Keyed by tunnel so a warp fleet and a vpngate fleet can run side by side. The
# producers WITHIN a dispatch are matrix jobs, so one dispatch launches the whole
# fleet rather than queueing behind itself.
concurrency:
  group: camoufox-producers-${{ inputs.tunnel }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        shell: bash
        run: |
          set -euo pipefail
          m=$(python3 -c "print(__import__('json').dumps(list(range(1, ${{ inputs.producers }}+1))))")
          echo "matrix=$m" >> "$GITHUB_OUTPUT"
          echo "matrix=$m"

  produce:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        idx: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 350
    env:
      PYTHONUNBUFFERED: "1"
      IDX: ${{ matrix.idx }}
      FANOUT: ${{ inputs.producers }}
      AUTH_SECRET: ${{ secrets.CAMOUFOX_AUTH_SECRET }}
      RELAY_URL: ${{ vars.CAMOUFOX_RELAY_URL || 'https://mohanadino.duckdns.org:8443/add' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Firefox runtime libraries
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libdbus-glib-1-2 libgbm1 libgtk-3-0 libnss3 \
            libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxt6 libxtst6 \
            fonts-liberation unzip

      - name: Cache Camoufox v135 browser
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-135.0.1-beta.24-lin-x86_64-61e1ec455e021720

      # `camoufox fetch` installs v152, which yields ZERO tokens on this sitekey
      # (measured: 70x error 600010). The exact v135 build must be placed by hand.
      - name: Install Camoufox 135.0.1-beta.24
        if: steps.browser-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          url='https://github.com/daijro/camoufox/releases/download/v135.0.1-beta.24/camoufox-135.0.1-beta.24-lin.x86_64.zip'
          expected='61e1ec455e021720af38a5cc5ff7566121363cb5b82b72f24e381ba2676a4888'
          # The release CDN 504s for stretches longer than a curl --retry budget.
          ok=""
          for attempt in 1 2 3 4 5 6; do
            if curl -fL --retry 3 --retry-delay 3 --retry-all-errors -C - \
                 --connect-timeout 20 -o /tmp/camoufox.zip "$url"; then
              if echo "$expected  /tmp/camoufox.zip" | sha256sum --check --strict; then ok=1; break; fi
            fi
            echo "attempt $attempt failed; backing off"; sleep $(( attempt * 10 ))
          done
          if [[ -z "$ok" ]]; then echo "could not download camoufox" >&2; exit 1; fi
          rm -rf "$HOME/.cache/camoufox"; mkdir -p "$HOME/.cache/camoufox"
          unzip -q /tmp/camoufox.zip -d "$HOME/.cache/camoufox"
          printf '%s\n' '{"version":"135.0.1","release":"beta.24"}' > "$HOME/.cache/camoufox/version.json"
          chmod -R u+rwX,go+rX "$HOME/.cache/camoufox"

      - name: Install pinned Python packages
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check \
            'camoufox[geoip]==0.4.11' 'playwright==1.61.0'
          python -c 'import camoufox, geoip2, playwright; print("imports=ok")'
          "$HOME/.cache/camoufox/camoufox-bin" --version

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: false

      - name: Build the join verifier
        shell: bash
        run: |
          set -euo pipefail
          cd experiments/egress/joinverify
          go build -o "$RUNNER_TEMP/joinverify" .
          echo "JOINVERIFY=$RUNNER_TEMP/joinverify" >> "$GITHUB_ENV"
          # The selftest is deliberately deferred until the tunnel is up: gartic's
          # WAF serves a 403 block page to the discovery endpoint from some runner
          # addresses, so a direct check here fails for reasons that have nothing
          # to do with the verifier.

      # These steps MUST fail the run if the tunnel does not come up. Falling
      # through to direct egress would produce nothing but 600010 for hours.
      - name: Bring up Cloudflare WARP
        if: inputs.tunnel == 'warp'
        shell: bash
        run: |
          set -euo pipefail
          echo "runner_egress=$(curl -4 -s --max-time 15 https://api.ipify.org)"
          chmod +x experiments/egress/warp_up.sh
          # WARP_FORBID_EXITS (comma-separated IPs, or prefixes ending in '.')
          # makes this re-roll onto a fresh registration rather than share an
          # exit with a peer lane. Sharing was measured to be harmless, so this
          # is available insurance rather than a requirement.
          experiments/egress/warp_up.sh 25344 | tee /tmp/warp.txt | sed 's/^/warp_/'
          echo "PROXY=socks5://127.0.0.1:25344" >> "$GITHUB_ENV"
          echo "EXITIP=$(sed -n 's/^exit_v4=//p' /tmp/warp.txt | tail -1)" >> "$GITHUB_ENV"
          # A working verifier must answer REJECTED code=5 for a bogus token;
          # anything else means the preflight below is measuring itself.
          "$JOINVERIFY" -proxy socks5://127.0.0.1:25344 '1.AAAAAAAAAAAA.BBBBBBBB'             | sed 's/^/selftest over tunnel (invalid token): /'

      - name: Bring up VPN Gate (relay slice ${{ matrix.idx }}/${{ inputs.producers }})
        if: inputs.tunnel == 'vpngate'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends openvpn
          curl -fsSL --retry 3 -o vpngate.csv https://www.vpngate.net/api/iphone/
          # Disjoint slice per producer: without this every runner ranks the feed
          # identically, picks the same relay, and the fleet collapses onto one exit.
          python3 experiments/egress/vpngate.py vpngate.csv /tmp/vpn             --count 6 --index "$IDX" --stride "$FANOUT"
          before=$(curl -4 -s --max-time 10 https://api.ipify.org)
          echo "egress_before=$before"
          ok=""
          for cfg in /tmp/vpn/*.ovpn; do
            echo "--- trying $(basename "$cfg") ---"
            sudo openvpn --config "$cfg" --daemon --log /tmp/ovpn.log               --connect-timeout 15 --connect-retry-max 1 || continue
            for _ in $(seq 1 15); do
              now=$(curl -4 -s --max-time 5 https://api.ipify.org || true)
              if [[ -n "$now" && "$now" != "$before" ]]; then ok="$now"; break; fi
              sleep 2
            done
            [[ -n "$ok" ]] && break
            sudo pkill openvpn || true; sleep 2
          done
          if [[ -z "$ok" ]]; then
            echo "no VPN Gate relay in this slice came up" >&2
            tail -20 /tmp/ovpn.log >&2 || true; exit 1
          fi
          echo "vpn_egress=$ok"
          curl -s --max-time 15 "https://ipinfo.io/${ok}/json" | tr -d '\n'; echo
          # OpenVPN takes the default route rather than exposing a proxy.
          echo "PROXY=" >> "$GITHUB_ENV"
          echo "EXITIP=$ok" >> "$GITHUB_ENV"
          # A working verifier must answer REJECTED code=5 for a bogus token;
          # anything else means the preflight below is measuring itself.
          "$JOINVERIFY" '1.AAAAAAAAAAAA.BBBBBBBB' \
            | sed 's/^/selftest over tunnel (invalid token): /'

      # Prove this exit actually produces ACCEPTED tokens before streaming
      # anything to the relay. Cloudflare will happily issue tokens that gartic
      # then refuses with code 5, and that failure is invisible producer-side.
      - name: Preflight — mint one token and verify it joins
        shell: bash
        run: |
          set -euo pipefail
          # A default-route tunnel has no PROXY for geoip to key off, but its
          # exit is just as foreign to the runner's UTC clock — and a timezone
          # contradicting the exit IP is itself a 600010 trigger.
          geo=""
          if [[ '${{ inputs.tunnel }}' == 'vpngate' ]]; then geo="--geoip"; fi
          python -u experiments/egress/probe.py \
            --label preflight --duration 120 --max-tokens 2 \
            --verify-count 1 --verifier "$JOINVERIFY" \
            --verifier-proxy "$PROXY" $geo \
            --result-file "$RUNNER_TEMP/preflight.json" \
            --executable "$HOME/.cache/camoufox/camoufox-bin" --ff-version 135
          python - "$RUNNER_TEMP/preflight.json" <<'PY'
          import json, sys
          result = json.load(open(sys.argv[1]))
          joined = result.get("join_verdicts", {}).get("JOINED", 0)
          print("preflight:", json.dumps(result, sort_keys=True))
          if not joined:
              sys.exit("preflight produced no ACCEPTED token — not feeding the relay")
          PY

      - name: Produce
        shell: bash
        run: |
          set -uo pipefail
          relay=""
          if [[ '${{ inputs.post_to_relay }}' == 'true' ]]; then
            relay="--relay-url $RELAY_URL"
            if [[ -z "${AUTH_SECRET:-}" ]]; then
              echo "post_to_relay=true but CAMOUFOX_AUTH_SECRET is unset" >&2; exit 1
            fi
          fi
          geo=""
          if [[ '${{ inputs.tunnel }}' == 'vpngate' ]]; then geo="--geoip"; fi
          python -u 'turnstile-system/token generators/camoufox-fresh/generator.py' \
            --out /tmp/tokens.jsonl \
            --label "gh-${{ inputs.tunnel }}-${{ matrix.idx }}" \
            --duration '${{ inputs.duration }}' \
            --token-interval '${{ inputs.token_interval }}' \
            --browser-lifetime 300 \
            --reload-interval 120 \
            --humanize $geo \
            --executable "$HOME/.cache/camoufox/camoufox-bin" \
            --ff-version 135 \
            $relay

      - name: Report
        if: always()
        shell: bash
        run: |
          tokens=$(wc -l < /tmp/tokens.jsonl 2>/dev/null || echo 0)
          secs='${{ inputs.duration }}'
          echo "producer ${{ matrix.idx }}/${{ inputs.producers }} tunnel=${{ inputs.tunnel }} exit=${EXITIP:-unknown}"
          echo "tokens produced = $tokens over ${secs}s (posted to relay: ${{ inputs.post_to_relay }})"
          python3 -c "print('rate = %.1f tok/min' % ($tokens/max(int('$secs'),1)*60))" 2>/dev/null || true
          echo "Webshare bandwidth used = 0"
