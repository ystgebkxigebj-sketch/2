name: Gartic Camoufox Pinned 135
run-name: Camoufox slot ${{ inputs.slot }}

on:
  workflow_dispatch:
    inputs:
      slot:
        description: Stable producer slot number (0 .. BUDGET_SLOTS-1)
        required: true
        default: "0"
      runtime_minutes:
        description: Generator runtime before clean successor handoff
        required: true
        default: "330"
      use_proxy:
        description: >-
          Route the browser through a CAMOUFOX_PROXIES exit. "false" solves
          direct from the runner IP, which costs zero Webshare bandwidth.
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  actions: write
  contents: read

concurrency:
  group: camoufox-pinned-slot-${{ inputs.slot }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    env:
      PYTHONUNBUFFERED: "1"
      # The proxy exists so Cloudflare will serve the challenge, NOT so gartic
      # will accept the token: the Oracle VM solves proxy-free from a datacenter
      # IP and those tokens join fine (verified 2026-07-24). The 600010 errors
      # that motivated the proxy were measured on Camoufox 152 — v135 saw zero
      # in the same direct-connection A/B — so the proxy may be unnecessary now
      # that the browser is pinned. use_proxy=false tests exactly that, and if it
      # holds it removes the Webshare dependency (and the 250 GB cap) entirely.
      REQUIRE_PROXY: ${{ inputs.use_proxy == 'false' && '0' || '1' }}
      # One tab, N lanes — never the reverse. Each tab gets its own browser
      # context and therefore its own cold HTTP cache; lanes share one.
      NUM_TABS: "1"
      NUM_LANES: "1"

      # --- proxy bandwidth budget -------------------------------------------
      # Every accepted Turnstile token costs ~0.75 MB through the proxy, and the
      # Webshare account behind CAMOUFOX_PROXIES is capped at 250 GB/month. An
      # unthrottled producer mints ~2.35 tok/s = ~4,750 GB/month, which is how
      # the previous account burned its whole quota in 22 hours.
      #
      # BUDGET_GB_PER_30D is the slice of that 250 GB cap the WHOLE producer
      # fleet may spend; the generator derives its mint rate from it. The
      # account also carries the live bot farm, so this must stay a minority
      # share. Quick conversions: 1 tok/min = 31.6 GB/month, 1 GB/month = 45.5
      # tokens/day. 60 GB => ~1.9 tok/min => ~2,730 tokens/day fleet-wide.
      #
      # BUDGET_SLOTS is how many producers divide that budget. The supervisor
      # reads this exact value out of this file to size the fleet, so the two
      # cannot drift apart — change it here and nowhere else.
      BUDGET_GB_PER_30D: "60"
      BUDGET_SLOTS: "2"
      # A proxyless run spends no metered bytes, so the byte budget has nothing
      # to protect — override the derived rate and let it run. Relay
      # backpressure still applies, so it stops when nobody is consuming.
      TOKENS_PER_MINUTE: ${{ inputs.use_proxy == 'false' && '120' || '' }}

      MAX_RUNTIME_MINUTES: ${{ inputs.runtime_minutes }}
      AUTH_SECRET: ${{ secrets.CAMOUFOX_AUTH_SECRET }}
      CAMOUFOX_PROXIES: ${{ secrets.CAMOUFOX_PROXIES }}
      RELAY_URL: ${{ vars.CAMOUFOX_RELAY_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select and mask this slot's proxy
        if: inputs.use_proxy != 'false'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t proxies < <(printf '%s\n' "$CAMOUFOX_PROXIES" | sed '/^[[:space:]]*$/d')
          if (( ${#proxies[@]} == 0 )); then
            echo "CAMOUFOX_PROXIES is empty" >&2
            exit 1
          fi
          index=$(( (10#${{ inputs.slot }} + GITHUB_RUN_NUMBER) % ${#proxies[@]} ))
          selected="${proxies[$index]}"
          echo "::add-mask::$selected"
          echo "PROXY=$selected" >> "$GITHUB_ENV"
          # Webshare meters bandwidth per ACCOUNT, and every proxy in one
          # account shares a credential, so the number of distinct users in the
          # secret is the number of 250 GB quotas this fleet is spending. Only
          # the count is printed — never the credential itself.
          accounts=$(printf '%s\n' "${proxies[@]}" | cut -d: -f3 | sort -u | wc -l)
          echo "proxy_count=${#proxies[@]} selected_index=$index accounts=$accounts"

      - name: Install Python 3.9.25
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.25"
          cache: pip
          cache-dependency-path: "turnstile-system/token generators/camoufox-pinned/requirements.txt"

      - name: Install Firefox runtime libraries
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libasound2t64 libdbus-glib-1-2 libgbm1 libgtk-3-0 libnss3 \
            libx11-xcb1 libxcomposite1 libxcursor1 libxdamage1 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxt6 libxtst6 \
            fonts-liberation unzip

      - name: Restore pinned Camoufox browser cache
        id: browser-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-135.0.1-beta.24-lin-x86_64-61e1ec455e021720

      - name: Install exact Camoufox browser 135.0.1-beta.24
        if: steps.browser-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          url='https://github.com/daijro/camoufox/releases/download/v135.0.1-beta.24/camoufox-135.0.1-beta.24-lin.x86_64.zip'
          expected='61e1ec455e021720af38a5cc5ff7566121363cb5b82b72f24e381ba2676a4888'
          curl -fL --retry 3 -o /tmp/camoufox.zip "$url"
          echo "$expected  /tmp/camoufox.zip" | sha256sum --check --strict
          rm -rf "$HOME/.cache/camoufox"
          mkdir -p "$HOME/.cache/camoufox"
          unzip -q /tmp/camoufox.zip -d "$HOME/.cache/camoufox"
          printf '%s\n' '{"version":"135.0.1","release":"beta.24"}' \
            > "$HOME/.cache/camoufox/version.json"
          chmod -R u+rwX,go+rX "$HOME/.cache/camoufox"

      - name: Install pinned Python packages and verify matrix
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check \
            -r 'turnstile-system/token generators/camoufox-pinned/requirements.txt'
          python --version
          python -m camoufox version
          "$HOME/.cache/camoufox/camoufox-bin" --version
          python -c 'import camoufox, geoip2, playwright; print("imports=ok")'

      - name: Run headless generator
        id: generator
        continue-on-error: true
        shell: bash
        run: |
          python -u 'turnstile-system/token generators/camoufox-pinned/generator.py'

      - name: Dispatch clean successor for this slot
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GENERATOR_OUTCOME: ${{ steps.generator.outcome }}
        shell: bash
        run: |
          set -u
          # A run that relayed no token almost always fails again immediately for
          # the same reason (blocked IP, dead proxy), and the successor starts at
          # once — so the chain becomes a hot loop. A proxyless experiment on
          # 2026-07-24 burned ~15 runs in an hour that way, each dying on
          # Cloudflare 600010 after ~4 minutes. Back off so a broken config fails
          # slowly and visibly instead of hammering.
          if [[ "$GENERATOR_OUTCOME" != "success" ]]; then
            echo "generator relayed no token; backing off 300s before handoff"
            sleep 300
          fi
          for attempt in 1 2 3 4 5; do
            if gh workflow run gartic-camoufox-pinned.yml \
              --ref "$GITHUB_REF_NAME" \
              -f slot='${{ inputs.slot }}' \
              -f runtime_minutes='${{ inputs.runtime_minutes }}' \
              -f use_proxy='${{ inputs.use_proxy }}'; then
              echo "successor dispatched on attempt=$attempt slot=${{ inputs.slot }}"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "successor dispatch failed; workflow_master.py will refill the slot" >&2
          exit 1
